<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Beautiful Gradient Rounded Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80" />
      <stop offset="100%" stop-color="#22C55E" />
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A" />
      <stop offset="100%" stop-color="#FDE047" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#15803D" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- App icon container rounded card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>

  <!-- Frog Body Group with elegant shadow -->
  <g filter="url(#shadow)">
    <!-- Eye Bumps (Left & Right) -->
    <circle cx="170" cy="190" r="75" fill="#22C55E" />
    <circle cx="342" cy="190" r="75" fill="#22C55E" />

    <!-- Head & Body base -->
    <ellipse cx="256" cy="300" rx="190" ry="140" fill="#22C55E" />

    <!-- Cute Soft Belly (Yellow-200 to 300) -->
    <ellipse cx="256" cy="350" rx="110" ry="80" fill="url(#bellyGrad)" />

    <!-- Left Eye details -->
    <circle cx="170" cy="180" r="50" fill="#FFFFFF" />
    <circle cx="175" cy="180" r="28" fill="#1E293B" />
    <circle cx="165" cy="170" r="10" fill="#FFFFFF" /> <!-- Sparkle -->
    <circle cx="185" cy="190" r="5" fill="#FFFFFF" />  <!-- Secondary Sparkle -->

    <!-- Right Eye details -->
    <circle cx="342" cy="180" r="50" fill="#FFFFFF" />
    <circle cx="337" cy="180" r="28" fill="#1E293B" />
    <circle cx="332" cy="170" r="10" fill="#FFFFFF" /> <!-- Sparkle -->
    <circle cx="352" cy="190" r="5" fill="#FFFFFF" />  <!-- Secondary Sparkle -->

    <!-- Cute Blushing Cheeks -->
    <ellipse cx="110" cy="300" rx="24" ry="16" fill="#F87171" opacity="0.65" />
    <ellipse cx="402" cy="300" rx="24" ry="16" fill="#F87171" opacity="0.65" />

    <!-- Cute Smiling W-shaped Mouth -->
    <path d="M 226,305 C 236,315 246,315 256,305 C 266,315 276,315 286,305" 
          stroke="#1E293B" stroke-width="10" stroke-linecap="round" fill="none" />
  </g>
</svg>
